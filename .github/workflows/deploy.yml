name: Build and Deploy

on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - '**/*.md'

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_DIR: /root/flux360
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ghcr.io/nikita-skakun/flux360:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set up SSH Private Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Deploy to Servers
        env:
          DEPLOY_SERVERS: ${{ secrets.DEPLOY_SERVERS }}
        run: |
          for server in $DEPLOY_SERVERS; do
            server=$(echo "$server" | xargs)
            if [ -z "$server" ]; then continue; fi

            ssh_target="root@$server"

            echo "--------------------------------------------------"
            echo "Deploying to $ssh_target..."
            echo "--------------------------------------------------"

            ssh -n -o StrictHostKeyChecking=no -i ~/.ssh/id_ed25519 "$ssh_target" "mkdir -p $DEPLOY_DIR"
            rsync -az --checksum -e "ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_ed25519" docker-compose.yml "$ssh_target":$DEPLOY_DIR/

            ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_ed25519 "$ssh_target" "sh -lc '
              cd $DEPLOY_DIR
              echo \"Pulling latest image...\"
              docker compose pull
              if docker compose ps -q --status running | grep -q .; then
                echo \"App is currently running. Restarting container...\"
                docker compose up -d --remove-orphans
              fi
              docker image prune -f
              echo \"Deployment complete.\"
            '"
          done
